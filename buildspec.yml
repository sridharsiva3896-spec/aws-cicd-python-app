version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-south-1
    IMAGE_REPO_NAME: python-app
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin <687568279796.dkr.ecr.ap-south-1.amazonaws.com/python-app>

  build:
    commands:
      - docker build -t $IMAGE_REPO_NAME .

  post_build:
    commands:
      - docker tag $IMAGE_REPO_NAME:latest <YOUR_ECR_URI>:latest
      - docker push <687568279796.dkr.ecr.ap-south-1.amazonaws.com/python-app>:latest
